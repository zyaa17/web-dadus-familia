            margin: auto; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; /* Hodi tau foto ho dadus fahe malu */
            justify-content: space-between;
        }
        .content { flex: 1; }
        .photo-box { 
            width: 120px; 
            height: 150px; 
            border: 2px solid #333; 
            margin-left: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #ddd;
            text-align: center;
        }
        h2 { border-bottom: 2px solid #333; padding-bottom: 5px; }
        p { margin: 10px 0; }
        label { font-weight: bold; }
    </style>
</head>
